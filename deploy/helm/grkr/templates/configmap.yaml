{{- if and .Values.configFile.create (not .Values.configFile.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grkr.fullname" . }}-config
  labels:
    {{- include "grkr.labels" . | nindent 4 }}
data:
  config.sh: |
{{ .Values.configFile.contents | indent 4 }}
{{- end }}
