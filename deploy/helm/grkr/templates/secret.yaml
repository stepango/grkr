{{- if and (not .Values.github.existingSecret) (or .Values.github.token .Values.codingAgent.xaiApiKey .Values.linear.accessToken .Values.linear.clientId .Values.linear.clientSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grkr.fullname" . }}
  labels:
    {{- include "grkr.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.github.token }}
  GH_TOKEN: {{ .Values.github.token | quote }}
  GITHUB_TOKEN: {{ .Values.github.token | quote }}
  {{- end }}
  {{- if .Values.codingAgent.xaiApiKey }}
  XAI_API_KEY: {{ .Values.codingAgent.xaiApiKey | quote }}
  {{- end }}
  {{- if .Values.linear.accessToken }}
  GRKR_LINEAR_ACCESS_TOKEN: {{ .Values.linear.accessToken | quote }}
  {{- end }}
  {{- if .Values.linear.clientId }}
  LINEAR_CLIENT_ID: {{ .Values.linear.clientId | quote }}
  {{- end }}
  {{- if .Values.linear.clientSecret }}
  LINEAR_CLIENT_SECRET: {{ .Values.linear.clientSecret | quote }}
  {{- end }}
{{- end }}
